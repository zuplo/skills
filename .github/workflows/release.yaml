name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$latest" ]; then
              latest="v0.0.0"
            fi

            version="${latest#v}"
            IFS='.' read -r major minor patch <<< "$version"

            case "${{ inputs.bump }}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
            esac

            tag="v${major}.${minor}.${patch}"
            echo "name=$tag" >> "$GITHUB_OUTPUT"
            echo "Computed next version: $tag (from $latest, bump: ${{ inputs.bump }})"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "Tag from push: ${{ github.ref_name }}"
          fi

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "${{ steps.tag.outputs.name }}"
          git push origin "${{ steps.tag.outputs.name }}"
          echo "Created tag: ${{ steps.tag.outputs.name }}"

      - name: Extract version
        id: version
        run: |
          tag="${{ steps.tag.outputs.name }}"
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Version: $version"

      - name: Sync skill metadata
        run: ./scripts/sync-skill-metadata.sh

      - name: Update marketplace.json version
        run: |
          python3 -c "
          import json
          with open('.claude-plugin/marketplace.json', 'r') as f:
              data = json.load(f)
          data['metadata']['version'] = '${{ steps.version.outputs.version }}'
          with open('.claude-plugin/marketplace.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Commit metadata updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Metadata already up to date"
          else
            git commit -m "Update metadata for ${{ steps.tag.outputs.name }}"
            git push origin HEAD:main
            # Move the tag to the new commit
            git tag -f "${{ steps.tag.outputs.name }}"
            git push origin "${{ steps.tag.outputs.name }}" --force
          fi

      - name: Build release artifacts
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}"
          ./scripts/build-release.sh "$RELEASE_URL"

      - name: Prepare release assets
        run: |
          for dir in dist/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            if [ -f "$dir/SKILL.md" ]; then
              cp "$dir/SKILL.md" "dist/${name}-SKILL.md"
            fi
          done

      - name: Create GitHub Release
        run: |
          files=()
          for f in dist/*.tar.gz dist/*-SKILL.md dist/index.json; do
            [ -f "$f" ] && files+=("$f")
          done

          gh release create "${{ steps.tag.outputs.name }}" \
            --title "${{ steps.tag.outputs.name }}" \
            --generate-notes \
            "${files[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.INTEGRATIONS_APP_ID }}
          private-key: ${{ secrets.INTEGRATIONS_APP_PRIVATE_KEY }}
          owner: zuplo
          repositories: www

      - name: Trigger www sync
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'zuplo',
              repo: 'www',
              event_type: 'sync-agent-skills',
              client_payload: {
                tag: '${{ steps.tag.outputs.name }}'
              }
            });
